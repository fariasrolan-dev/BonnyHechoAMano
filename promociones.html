<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Promociones especiales de Bonny: descuentos por tiempo limitado en ramos, amigurumis y personalizados."
    />
    <title>Promociones | Bonny</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/promociones.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">
        <img src="media/imagenes/bonny_logo.png" alt="Logo de Bonny" />
      </div>

      <nav>
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Catálogo</a>
        <a href="promociones.html">Promociones</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </header>

    <!-- TITULO -->
    <section class="titulo">
      <h1>Promociones especiales</h1>
      <p>
        <i class="fa-solid fa-clock"></i>
        Aprovecha nuestras ofertas por tiempo limitado
      </p>
      <div class="linea"></div>
    </section>

    <!-- PROMOCIONES - GRID -->
    <section class="promociones">
      <!-- CARD 1 -->
      <div class="promo-card">
        <div class="descuento">-20%</div>
        <img
          src="media/imagenes/AMIGURUMIS/SaveClip.App_655259220_18120345229614800_5717667373593046456_n.jpg"
          alt="Dooby en promoción"
        />
        <h2>Dooby</h2>
        <p class="precio-anterior">S/ 50</p>
        <p class="precio">S/ 40</p>
        <button><i class="fa-brands fa-whatsapp"></i> Comprar</button>
      </div>

      <!-- CARD 2 -->
      <div class="promo-card">
        <div class="descuento">-15%</div>
        <img
          src="media/imagenes/RAMOS FLORES/498712678_122224379612191318_9195878846840847863_n.jpg"
          alt="Amigurumi tejido en promoción"
        />
        <h2>Maceta con 2 Tulipanes</h2>
        <p class="precio-anterior">S/ 50</p>
        <p class="precio">S/ 42.50</p>
        <button><i class="fa-brands fa-whatsapp"></i> Comprar</button>
      </div>

      <!-- CARD 3 -->
      <div class="promo-card">
        <div class="descuento">-20%</div>
        <img
          src="media/imagenes/RAMOS FLORES/005.jpg"
          alt="Regalo personalizado en promoción"
        />
        <h2>Ramo Snoopy</h2>
        <p class="precio-anterior">S/ 70</p>
        <p class="precio">S/ 56</p>
        <button><i class="fa-brands fa-whatsapp"></i> Comprar</button>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p>
        <i class="fa-solid fa-heart"></i>
        &copy; 2026 Bonny &mdash; Todos los derechos reservados
      </p>
    </footer>
  </body>
</html>
